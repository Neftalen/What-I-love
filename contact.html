<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — My 3D Printing World</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="topbar">
        <header>
            <h1>My 3D Printing World</h1>
        </header>

        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="about.html">About</a>
            <a href="contact.html" aria-current="page">Contact</a>
        </nav>
    </div>

    <main>
        <div class="cards">
            <section class="card">
                <h2>
                    <span class="icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16v16H4z"></path>
                            <path d="M22 6l-10 7L2 6"></path>
                        </svg>
                    </span>
                    Contact Me
                </h2>
                <p class="kicker">If you want to talk about 3D printing or have ideas, send me a message!</p>

                <form class="contact-form" action="#" method="post">
                    <label for="name">Name</label>
                    <input id="name" name="name" type="text" placeholder="Your name" autocomplete="name" required>

                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="Your email" autocomplete="email" required>

                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Write your message..." required></textarea>

                    <button type="submit">Send Message</button>
                </form>
            </section>
        </div>
    </main>
    

    <footer>
        <p>© 2026 My 3D World</p>
        <div class="contact-info">
           <p>Email: zeneb@email.com</p>
           <p>Location: Ethiopia</p>
        </div>
    </footer>

</body>
</html>
